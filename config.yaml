mode: paper
symbols:
  - BTC-USDT
  - ETH-USDT
entry_timeframe: 1m
trend_timeframe: 5m

risk:
  account_size_usdt: 1000
  risk_per_trade: 0.005
  daily_loss_limit: 0.02
  max_open_positions: 2
  max_consecutive_losses: 3
  max_position_loss_on_margin: 0.05

execution:
  margin_mode: isolated
  leverage:
    BTC-USDT: 3
    ETH-USDT: 3
  take_profit_pct: 0.006
  stop_loss_pct: 0.004
  stop_atr_mult: 1.2
  partial_tp_r: 1.0
  final_tp_r: 1.8
  trailing_start_r: 0.8
  trailing_atr_mult: 0.8

filters:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  trigger_mode: cross_or_alignment # cross_only | cross_recent | cross_or_alignment
  cross_lookback: 3
  rsi_period: 14
  rsi_long_threshold: 50
  rsi_short_threshold: 50
  volume_ma_period: 20
  require_volume_confirmation: true
  min_trend_gap_pct: 0.0005
  min_entry_rows: 80
  min_trend_rows: 100
  spread_max_bps: 8
