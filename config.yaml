mode: live
symbols:
  - BTC-USDT
  - ETH-USDT
entry_timeframe: 1m
trend_timeframe: 5m

risk:
  account_size_usdt: 40
  risk_per_trade: 0.01
  daily_loss_limit: 0.03
  max_open_positions: 2
  max_consecutive_losses: 4
  max_position_loss_on_margin: 0.08
  max_margin_usage: 0.95

execution:
  margin_mode: isolated
  leverage:
    BTC-USDT: 10
    ETH-USDT: 10
  take_profit_pct: 0.006
  stop_loss_pct: 0.004
  stop_atr_mult: 1.0
  partial_tp_r: 1.0
  final_tp_r: 1.6
  trailing_start_r: 0.8
  trailing_atr_mult: 0.8

filters:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  trigger_mode: cross_or_alignment # cross_only | cross_recent | cross_or_alignment
  cross_lookback: 5
  rsi_period: 14
  rsi_long_threshold: 45
  rsi_short_threshold: 55
  volume_ma_period: 20
  require_volume_confirmation: false
  min_trend_gap_pct: 0.0001
  min_entry_rows: 60
  min_trend_rows: 80
  spread_max_bps: 12
